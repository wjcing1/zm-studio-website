<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Composer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .step {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress {
            display: flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: background 0.3s;
        }

        .progress-dot.active {
            background: #000;
        }

        .progress-dot.done {
            background: #10b981;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #111;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: #000;
            background: #fafafa;
        }

        .option.selected {
            border-color: #000;
            background: #000;
            color: #fff;
        }

        .option-icon {
            font-size: 20px;
        }

        .option-text {
            font-size: 15px;
            font-weight: 500;
        }

        .back-btn {
            margin-top: 24px;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
        }

        .back-btn:hover {
            color: #666;
        }

        /* Result Page */
        .result-box {
            background: #111;
            color: #fff;
            padding: 24px;
            border-radius: 12px;
            font-family: 'SF Mono', monospace;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }

        .highlight {
            color: #10b981;
            font-weight: 500;
        }

        .copy-btn {
            width: 100%;
            padding: 16px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #333;
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .restart {
            text-align: center;
            margin-top: 16px;
            color: #999;
            font-size: 14px;
            cursor: pointer;
        }

        .restart:hover {
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Progress -->
        <div class="progress">
            <div class="progress-dot active" id="dot-0"></div>
            <div class="progress-dot" id="dot-1"></div>
            <div class="progress-dot" id="dot-2"></div>
            <div class="progress-dot" id="dot-3"></div>
            <div class="progress-dot" id="dot-4"></div>
        </div>

        <!-- Step 1: Building Type -->
        <div class="step active" id="step-0">
            <h1>你在设计什么？</h1>
            <p class="subtitle">选择建筑类型</p>
            <div class="options">
                <div class="option" onclick="select(0, '博物馆', 'Museum')">
                    <span class="option-icon">🏛️</span>
                    <span class="option-text">博物馆 / 美术馆</span>
                </div>
                <div class="option" onclick="select(0, '办公楼', 'Office Building')">
                    <span class="option-icon">🏢</span>
                    <span class="option-text">办公楼 / 联合办公</span>
                </div>
                <div class="option" onclick="select(0, '住宅', 'Residence')">
                    <span class="option-icon">🏠</span>
                    <span class="option-text">住宅 / 别墅</span>
                </div>
                <div class="option" onclick="select(0, '城市更新项目', 'Urban Renewal')">
                    <span class="option-icon">🏙️</span>
                    <span class="option-text">城市更新 / 工业遗址</span>
                </div>
            </div>
        </div>

        <!-- Step 2: Lighting -->
        <div class="step" id="step-1">
            <h1>什么时间的光？</h1>
            <p class="subtitle">选择光线氛围</p>
            <div class="options">
                <div class="option" onclick="select(1, '黄金时刻', 'Golden hour, warm sunset glow, side lighting')">
                    <span class="option-icon">🌅</span>
                    <span class="option-text">黄金时刻 / 日落</span>
                </div>
                <div class="option" onclick="select(1, '蓝调时刻', 'Blue hour, cold ambient light, warm interior glow')">
                    <span class="option-icon">🌌</span>
                    <span class="option-text">蓝调时刻 / 黄昏</span>
                </div>
                <div class="option" onclick="select(1, '阴天漫射光', 'Overcast, soft diffused light, no harsh shadows')">
                    <span class="option-icon">🌫️</span>
                    <span class="option-text">阴天漫射光</span>
                </div>
                <div class="option"
                    onclick="select(1, '清晨薄雾', 'Morning mist, hazy atmosphere, atmospheric perspective')">
                    <span class="option-icon">🌄</span>
                    <span class="option-text">清晨薄雾</span>
                </div>
            </div>
            <div class="back-btn" onclick="goBack(1)">← 返回上一步</div>
        </div>

        <!-- Step 3: Material -->
        <div class="step" id="step-2">
            <h1>建筑穿什么？</h1>
            <p class="subtitle">选择主要材质</p>
            <div class="options">
                <div class="option" onclick="select(2, '白色混凝土', 'White concrete, fair-faced concrete, matte finish')">
                    <span class="option-icon">⬜</span>
                    <span class="option-text">白色混凝土</span>
                </div>
                <div class="option"
                    onclick="select(2, '玻璃幕墙', 'Glass curtain wall, highly reflective, transparent facade')">
                    <span class="option-icon">🪟</span>
                    <span class="option-text">玻璃幕墙</span>
                </div>
                <div class="option"
                    onclick="select(2, '银色金属板', 'Stainless steel panels, metallic finish, seamless joints')">
                    <span class="option-icon">🔩</span>
                    <span class="option-text">银色金属板</span>
                </div>
                <div class="option" onclick="select(2, '木材', 'Warm oak wood, natural grain, timber cladding')">
                    <span class="option-icon">🪵</span>
                    <span class="option-text">木材 (暖橡木色)</span>
                </div>
            </div>
            <div class="back-btn" onclick="goBack(2)">← 返回上一步</div>
        </div>

        <!-- Step 4: Environment -->
        <div class="step" id="step-3">
            <h1>建筑在哪里？</h1>
            <p class="subtitle">选择环境</p>
            <div class="options">
                <div class="option" onclick="select(3, '森林', 'Dense forest, surrounded by hills, lush vegetation')">
                    <span class="option-icon">🌲</span>
                    <span class="option-text">森林 / 山丘</span>
                </div>
                <div class="option" onclick="select(3, '海边', 'Seaside, cliff, ocean view, coastal landscape')">
                    <span class="option-icon">🌊</span>
                    <span class="option-text">海边 / 悬崖</span>
                </div>
                <div class="option" onclick="select(3, '城市街道', 'Urban street, plaza, wet pavement, city context')">
                    <span class="option-icon">🏙️</span>
                    <span class="option-text">城市街道</span>
                </div>
                <div class="option" onclick="select(3, '湿地', 'Wetland, lakeside, calm water reflection, reeds')">
                    <span class="option-icon">🌿</span>
                    <span class="option-text">湿地 / 湖边</span>
                </div>
            </div>
            <div class="back-btn" onclick="goBack(3)">← 返回上一步</div>
        </div>

        <!-- Step 5: Result -->
        <div class="step" id="step-4">
            <h1>✨ 你的咒语</h1>
            <p class="subtitle">复制并粘贴到 AI 工具</p>
            <div class="result-box" id="result"></div>
            <button class="copy-btn" onclick="copyPrompt()">复制 Prompt</button>
            <div class="restart" onclick="restart()">重新开始</div>
        </div>
    </div>

    <script>
        const selections = { type: '', light: '', material: '', env: '' };
        const selectionsEn = { type: '', light: '', material: '', env: '' };
        let currentStep = 0;

        function select(step, valueCn, valueEn) {
            const keys = ['type', 'light', 'material', 'env'];
            selections[keys[step]] = valueCn;
            selectionsEn[keys[step]] = valueEn;

            // Update progress
            document.getElementById(`dot-${step}`).classList.remove('active');
            document.getElementById(`dot-${step}`).classList.add('done');

            // Go to next step
            currentStep = step + 1;
            document.getElementById(`step-${step}`).classList.remove('active');
            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById(`dot-${currentStep}`).classList.add('active');

            // If final step, generate prompt
            if (currentStep === 4) {
                generatePrompt();
            }
        }

        function goBack(step) {
            document.getElementById(`dot-${step}`).classList.remove('active');
            document.getElementById(`dot-${step - 1}`).classList.remove('done');
            document.getElementById(`dot-${step - 1}`).classList.add('active');

            document.getElementById(`step-${step}`).classList.remove('active');
            document.getElementById(`step-${step - 1}`).classList.add('active');
            currentStep = step - 1;
        }

        function generatePrompt() {
            const prompt = `根据这张图片生成一张建筑效果图，不要更换视角，严格遵守原图的构图。超级写实，高级的建筑渲染图，高分辨率，8k resolution，masterpiece，photorealistic。

Strictly follow the perspective of the reference sketch, Keep exact geometry, Do not change the camera angle.

一张<span class="highlight">${selections.type}</span>的建筑效果图。
光线是<span class="highlight">${selections.light}</span>。
<span class="highlight">${selectionsEn.light}</span>
建筑材质为<span class="highlight">${selections.material}</span>。
<span class="highlight">${selectionsEn.material}</span>
环境是<span class="highlight">${selections.env}</span>。
<span class="highlight">${selectionsEn.env}</span>

负面提示词：模糊，低分辨率，卡通风格，过饱和色彩，扭曲的透视。`;

            document.getElementById('result').innerHTML = prompt;
        }

        function copyPrompt() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text);

            const btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制 ✓';
            btn.classList.add('copied');

            setTimeout(() => {
                btn.textContent = '复制 Prompt';
                btn.classList.remove('copied');
            }, 2000);
        }

        function restart() {
            currentStep = 0;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.progress-dot').forEach(d => {
                d.classList.remove('active', 'done');
            });
            document.getElementById('step-0').classList.add('active');
            document.getElementById('dot-0').classList.add('active');
        }
    </script>
</body>

</html>
